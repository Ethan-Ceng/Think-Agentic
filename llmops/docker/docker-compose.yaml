name: llmops
services:
  llmops-ui:
    image: llmops-ui:0.1.0
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: llmops-ui
    restart: always
    environment: [ ]
    ports:
      - "${UI_HOST_PORT:-3100}:3000"
  llmops-api:
    image: llmops-api:0.1.0
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: llmops-api
    restart: always
    volumes:
      - ./volumes/app/storage:/app/api/storage
    environment:
      # 模式为 API，代表启用 API 服务
      MODE: api
      SERVER_WORKER_AMOUNT: 4
      SERVER_THREAD_AMOUNT: 4
      # 数据库迁移配置
      MIGRATION_ENABLED: 'true'
      # JWT 加密秘钥
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me-please-rotate}
      SETTING_CRYPTO_KEY: ${SETTING_CRYPTO_KEY:-}
      # 服务配置
      SERVICE_IP: ${SERVICE_IP:-127.0.0.1}
      SERVICE_API_PREFIX: ${SERVICE_API_PREFIX:-http://localhost:5011}
      # CSRF 校验开关
      WTF_CSRF_ENABLED: 'false'
      # SQLAlchemy 数据库配置
      SQLALCHEMY_DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD:-llmops123456}@llmops-db:5432/${POSTGRES_DB:-llmops}?client_encoding=utf8
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-llmops123456}@llmops-db:5432/${POSTGRES_DB:-llmops}?client_encoding=utf8
      SQLALCHEMY_POOL_SIZE: 30
      SQLALCHEMY_POOL_RECYCLE: 3600
      SQLALCHEMY_ECHO: 'true'
      # Redis 缓存数据库配置
      REDIS_HOST: llmops-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ''
      REDIS_PASSWORD: ${REDIS_PASSWORD:-llmops123456}
      REDIS_DB: 0
      REDIS_USE_SSL: 'false'
      REDIS_URL: redis://:${REDIS_PASSWORD:-llmops123456}@llmops-redis:6379/0
      # Weaviate 向量数据库配置
      WEAVIATE_HTTP_HOST: llmops-weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: llmops-weaviate
      WEAVIATE_GRPC_PORT: 50051
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-dev-weaviate-api-key}
      # 腾讯云 COS 对象存储
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_SCHEME: ${COS_SCHEME:-https}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_DOMAIN: ${COS_DOMAIN:-}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-/app/api/storage/uploads}
      LOCAL_STORAGE_BASE_URL: ${LOCAL_STORAGE_BASE_URL:-http://localhost:3100/api/upload-files}
      # Celery 异步队列任务配置
      CELERY_BROKER_DB: 1
      CELERY_RESULT_BACKEND_DB: 1
      CELERY_TASK_IGNORE_RESULT: 'true'
      CELERY_RESULT_EXPIRES: 3600
      CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP: 'true'
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-llmops123456}@llmops-redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-llmops123456}@llmops-redis:6379/1
      # GitHub OAuth 应用秘钥
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3100/auth/authorize/github}
      # LangSmith 配置
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-LLMOpsDev}
      # HuggingFace 配置
      TRANSFORMERS_OFFLINE: 0
      # 辅助 Agent 智能体应用 id 标识
      ASSISTANT_AGENT_ID: ${ASSISTANT_AGENT_ID:-6774fcef-b594-8008-b30c-a05b8190afe6}
      # OpenAI 服务提供者
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_BASE_URL: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-4o-mini}
      DEFAULT_LLM_TEMPERATURE: ${DEFAULT_LLM_TEMPERATURE:-0.5}
      DEFAULT_LLM_TOP_P: ${DEFAULT_LLM_TOP_P:-0.85}
      DEFAULT_LLM_FREQUENCY_PENALTY: ${DEFAULT_LLM_FREQUENCY_PENALTY:-0.2}
      DEFAULT_LLM_PRESENCE_PENALTY: ${DEFAULT_LLM_PRESENCE_PENALTY:-0.2}
      DEFAULT_LLM_MAX_TOKENS: ${DEFAULT_LLM_MAX_TOKENS:-8192}
      # DeepSeek 服务提供者
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      # 百度千帆服务提供者
      qianfan_ak: ${QIANFAN_AK:-}
      qianfan_sk: ${QIANFAN_SK:-}
      # 月之暗面服务提供者
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      # 通义千问服务提供者
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # 高德工具 API 秘钥
      GAODE_API_KEY: ${GAODE_API_KEY:-}
      # 谷歌 Serper 搜索 API 秘钥
      SERPER_API_KEY: ${SERPER_API_KEY:-}
    ports:
      - "${API_HOST_PORT:-5011}:5001"
    depends_on:
      - llmops-db
      - llmops-redis
      - llmops-weaviate
  llmops-celery:
    image: llmops-api:0.1.0
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: llmops-celery
    restart: always
    volumes:
      - ./volumes/app/storage:/app/api/storage
    environment:
      # 模式为 Celery，代表启用 Celery 异步任务队列
      MODE: celery
      CELERY_WORKER_AMOUNT: 4
      # 数据库迁移配置
      MIGRATION_ENABLED: 'false'
      # 服务配置
      SERVICE_IP: ${SERVICE_IP:-127.0.0.1}
      SERVICE_API_PREFIX: ${SERVICE_API_PREFIX:-http://localhost:5011}
      # JWT 加密秘钥
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me-please-rotate}
      SETTING_CRYPTO_KEY: ${SETTING_CRYPTO_KEY:-}
      # CSRF 校验开关
      WTF_CSRF_ENABLED: 'false'
      # SQLAlchemy 数据库配置
      SQLALCHEMY_DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD:-llmops123456}@llmops-db:5432/${POSTGRES_DB:-llmops}?client_encoding=utf8
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-llmops123456}@llmops-db:5432/${POSTGRES_DB:-llmops}?client_encoding=utf8
      SQLALCHEMY_POOL_SIZE: 30
      SQLALCHEMY_POOL_RECYCLE: 3600
      SQLALCHEMY_ECHO: 'true'
      # Redis 缓存数据库配置
      REDIS_HOST: llmops-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ''
      REDIS_PASSWORD: ${REDIS_PASSWORD:-llmops123456}
      REDIS_DB: 0
      REDIS_USE_SSL: 'false'
      REDIS_URL: redis://:${REDIS_PASSWORD:-llmops123456}@llmops-redis:6379/0
      # Weaviate 向量数据库配置
      WEAVIATE_HTTP_HOST: llmops-weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: llmops-weaviate
      WEAVIATE_GRPC_PORT: 50051
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-dev-weaviate-api-key}
      # 腾讯云 COS 对象存储
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_SCHEME: ${COS_SCHEME:-https}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_DOMAIN: ${COS_DOMAIN:-}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-/app/api/storage/uploads}
      LOCAL_STORAGE_BASE_URL: ${LOCAL_STORAGE_BASE_URL:-http://localhost:3100/api/upload-files}
      # Celery 异步队列任务配置
      CELERY_BROKER_DB: 1
      CELERY_RESULT_BACKEND_DB: 1
      CELERY_TASK_IGNORE_RESULT: 'true'
      CELERY_RESULT_EXPIRES: 3600
      CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP: 'true'
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-llmops123456}@llmops-redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-llmops123456}@llmops-redis:6379/1
      # GitHub OAuth 应用秘钥
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3100/auth/authorize/github}
      # LangSmith 配置
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-LLMOpsDev}
      # HuggingFace 配置
      TRANSFORMERS_OFFLINE: 0
      # 辅助 Agent 智能体应用 id 标识
      ASSISTANT_AGENT_ID: ${ASSISTANT_AGENT_ID:-6774fcef-b594-8008-b30c-a05b8190afe6}
      # OpenAI 服务提供者
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_BASE_URL: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-4o-mini}
      DEFAULT_LLM_TEMPERATURE: ${DEFAULT_LLM_TEMPERATURE:-0.5}
      DEFAULT_LLM_TOP_P: ${DEFAULT_LLM_TOP_P:-0.85}
      DEFAULT_LLM_FREQUENCY_PENALTY: ${DEFAULT_LLM_FREQUENCY_PENALTY:-0.2}
      DEFAULT_LLM_PRESENCE_PENALTY: ${DEFAULT_LLM_PRESENCE_PENALTY:-0.2}
      DEFAULT_LLM_MAX_TOKENS: ${DEFAULT_LLM_MAX_TOKENS:-8192}
      # DeepSeek 服务提供者
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      # 百度千帆服务提供者
      qianfan_ak: ${QIANFAN_AK:-}
      qianfan_sk: ${QIANFAN_SK:-}
      # 月之暗面服务提供者
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      # 通义千问服务提供者
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # 高德工具 API 秘钥
      GAODE_API_KEY: ${GAODE_API_KEY:-}
      # 谷歌 Serper 搜索 API 秘钥
      SERPER_API_KEY: ${SERPER_API_KEY:-}
    depends_on:
      - llmops-db
      - llmops-redis
      - llmops-weaviate
  llmops-redis:
    image: redis:6-alpine
    restart: always
    container_name: llmops-redis
    volumes:
      - ./volumes/redis/data:/data
    # 启动 Redis 服务时配置密码
    command: redis-server --requirepass ${REDIS_PASSWORD:-llmops123456}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-llmops123456}", "ping" ]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
  llmops-db:
    image: postgres:15-alpine
    restart: always
    container_name: llmops-db
    environment:
      # 配置默认账户名、账户密码、默认数据库、数据存储位置
      PGUSER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmops123456}
      POSTGRES_DB: ${POSTGRES_DB:-llmops}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # 将 PostgreSQL 数据挂载到本地 ./volumes/db/data
      - ./volumes/db/data:/var/lib/postgresql/data/pgdata
      # 初始化脚本只会在空数据目录下执行，已有数据时不会重复执行
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # 每隔 1s 发起一次健康检查，最多重试 30 次
      test: [ "CMD", "pg_isready" ]
      interval: 1s
      timeout: 3s
      retries: 30
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
  llmops-weaviate:
    image: semitechnologies/weaviate:1.28.4
    container_name: llmops-weaviate
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: 25  # 查询默认返回的数据条数
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'false'  # 需要授权才能和 Weaviate 交互
      PERSISTENCE_DATA_PATH: /var/lib/weaviate  # Weaviate 数据存储路径
      DEFAULT_VECTORIZER_MODULE: 'none'  # 向量化模块设置为 none
      CLUSTER_HOSTNAME: 'node1'  # 节点的主机名
      AUTHENTICATION_APIKEY_ENABLED: 'true'  # 启用基于 API 秘钥的身份校验
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: '${WEAVIATE_API_KEY:-dev-weaviate-api-key}'
      AUTHENTICATION_APIKEY_USERS: 'llmops@imooc.com'  # 基于秘钥的 API 身份列表
      AUTHORIZATION_ADMINLIST_ENABLED: 'true'  # 启用 AdminList 授权方案
      AUTHORIZATION_ADMINLIST_USERS: 'llmops@imooc.com'  # 使用 AdminList 方案时具有管理权限的用户
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    ports:
      - "${WEAVIATE_HTTP_HOST_PORT:-8080}:8080"
      - "${WEAVIATE_GRPC_HOST_PORT:-50051}:50051"
  llmops-nginx:
    image: nginx:latest
    profiles:
      - edge
    restart: always
    container_name: llmops-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/ssl
    depends_on:
      - llmops-ui
      - llmops-api
    ports:
      - "${NGINX_HTTP_HOST_PORT:-80}:80"
      - "${NGINX_HTTPS_HOST_PORT:-443}:443"


